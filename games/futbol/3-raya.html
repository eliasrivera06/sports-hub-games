<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cruce Futbolero - Sports Hub Games</title>

    <!-- Favicon -->
    <link rel="icon" href="../../assets/images/logo_grande.png" type="image/png">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <!-- Fuente Retro -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <!-- CSS propio del juego -->
    <link rel="stylesheet" href="3-raya.css">
</head>

<body>

    <!-- NAVBAR RETRO -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand animate__animated animate__fadeIn" href="../../index.html">
                <img src="../../assets/images/logo.png" class="logo" alt="Sports Hub Logo">
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../../principal.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="../../perfil.html">Perfil</a></li>
                    <li class="nav-item"><a class="nav-link" href="../../login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="screen-container">

        <!-- PANTALLA INICIAL (HOME) -->
        <div id="home-screen" class="home-card animate__animated animate__zoomIn">
            <h1 class="title-main">CRUCE<br>FUTBOLERO</h1>
            <p class="subtitle">¿Podrás completar la cuadrícula relacionando clubes y países?</p>

            <div class="my-4">
                <div
                    style="font-family: 'Press Start 2P', cursive; font-size: 8px; color: var(--text-primary); margin-bottom: 12px;">
                    DIFICULTAD:
                </div>
                <div class="difficulty-selector">
                    <button class="btn-retro difficulty-btn active" data-diff="easy">Fácil</button>
                    <button class="btn-retro difficulty-btn" data-diff="medium">Medio</button>
                    <button class="btn-retro difficulty-btn" data-diff="hard">Difícil</button>
                </div>
            </div>

            <div class="my-4">
                <div
                    style="font-family: 'Press Start 2P', cursive; font-size: 8px; color: var(--text-primary); margin-bottom: 12px;">
                    TEMPORIZADOR:
                </div>
                <div class="timer-selector d-flex justify-content-center flex-wrap" style="margin-bottom: 25px;">
                    <button class="btn-retro timer-btn active" data-timer="none"
                        style="font-size: 9px; padding: 8px 12px;">Sin Tiempo</button>
                    <button class="btn-retro timer-btn" data-timer="30"
                        style="font-size: 9px; padding: 8px 12px;">30s</button>
                    <button class="btn-retro timer-btn" data-timer="60"
                        style="font-size: 9px; padding: 8px 12px;">60s</button>
                </div>
            </div>

            <div class="d-flex flex-column align-items-center gap-2 mt-4">
                <button class="btn-retro" onclick="startPlay()" style="width: 250px;">JUGAR DIARIO 🏆</button>
                <button class="btn-retro" onclick="showHowToPlay()" style="width: 250px;">COMO JUGAR 📖</button>
                <button class="btn-retro" onclick="showStatistics()" style="width: 250px;">ESTADÍSTICAS 📊</button>
                <button class="btn-retro" onclick="window.location.href='futbol.html'"
                    style="width: 250px; border-color: var(--color-error); box-shadow: 4px 4px 0px var(--color-error);">⬅
                    VOLVER</button>
            </div>
        </div>

        <!-- PANTALLA DE JUEGO -->
        <div id="game-screen" class="w-100 d-none animate__animated animate__fadeIn">

            <!-- Encabezado en juego -->
            <div class="in-game-header">
                <button class="btn-retro" onclick="showHomeScreen()">⬅ MENÚ</button>
                <h2 class="title-main m-0" style="font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    JUEGO ⚽ <span id="header-timer" class="header-timer d-none">Sin tiempo</span>
                </h2>
                <button class="btn-retro" style="visibility: hidden; margin: 10px;">⬅ MENÚ</button>
            </div>

            <!-- Barra de temporizador -->
            <div id="timer-display-container" class="timer-bar-container d-none animate__animated animate__fadeIn">
                <div class="timer-bar-outer">
                    <div id="timer-bar-inner" class="timer-bar-inner"></div>
                </div>
            </div>

            <!-- Tablero 3x3 (+ cabeceras = 4x4) -->
            <div id="grid-board" class="grid-container animate__animated animate__fadeIn">
                <!-- Se genera dinámicamente mediante JS -->
            </div>

            <!-- Campo de búsqueda -->
            <div class="search-section mt-4 animate__animated animate__fadeInUp">
                <label for="search-input" class="search-label">BUSCAR JUGADOR:</label>
                <div class="search-input-wrapper">
                    <input type="text" id="search-input" class="search-input"
                        placeholder="Ej. Messi, Cristiano, Vinicius..." autocomplete="off">
                    <div id="suggestions-box" class="suggestions-box d-none">
                        <!-- Autocomplete sugerencias dinámicas -->
                    </div>
                </div>
            </div>

        </div>

    </div>

    <!-- CANVAS PARA LLUVIA DE CONFETI -->
    <canvas id="victory-canvas"></canvas>

    <!-- FOOTER RETRO -->
    <footer>
        <p>© 2026 Sports Hub Games - Módulo de Fútbol</p>
    </footer>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Archivos de datos del juego -->
    <script src="jugadores.js"></script>
    <script src="grids.js"></script>

    <!-- Script principal -->
    <script src="3-raya.js"></script>

</body>

</html>
