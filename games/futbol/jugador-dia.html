<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Jugador del Día - Sports Hub Games</title>
    
    <!-- Favicon -->
  <link rel="icon" href="../../assets/images/logo_grande.png" type="image/png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <!-- Fuente Retro -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <!-- CSS propio del juego -->
    <link rel="stylesheet" href="jugador-dia.css">
</head>
<body>

    <!-- NAVBAR RETRO -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <!-- LOGO -->
            <a class="navbar-brand" href="../../index.html">
                <img src="../../assets/images/logo.png" class="logo" alt="Sports Hub Logo">
            </a>

            <!-- MENÚ -->
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../../principal.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="../../perfil.html">Perfil</a></li>
                    <li class="nav-item"><a class="nav-link" href="../../login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTENEDOR DEL JUEGO -->
    <div class="game-container animate__animated animate__fadeIn">
        
        <h1 class="title">EL JUGADOR DEL DIA</h1>

        <p class="subtitle">ADIVINA EL NOMBRE O APELLIDO DEL FUTBOLISTA EN 6 INTENTOS</p>

        <!-- PANEL DE ACCIONES Y PISTAS -->
        <div class="control-panel">
            <button class="btn-retro" onclick="window.location.href='futbol.html'">
                ⬅ VOLVER
            </button>
            <button id="hintBtn" class="btn-retro btn-hint" onclick="showHint()">
                💡 VER PISTA (3)
            </button>
        </div>

        <!-- RECUADRO DE PISTAS DESPLEGADAS -->
        <div id="hintBox" class="w-100 text-center mb-3 p-3" style="background-color: #1a1c28; border: 3px solid #2b2d42; font-size: 8px; line-height: 1.6;">
            <span id="hintText">Presiona el botón para recibir pistas sobre el jugador de hoy.</span>
        </div>

        <!-- CUADRÍCULA DEL JUEGO (WORDLE GRID) -->
        <div class="board-container">
            <div id="board" class="board">
                <!-- Se genera dinámicamente mediante JS -->
            </div>
        </div>

        <!-- TECLADO EN PANTALLA -->
        <div class="keyboard">
            <!-- Fila 1 -->
            <div class="keyboard-row">
                <button class="key" data-key="Q">Q</button>
                <button class="key" data-key="W">W</button>
                <button class="key" data-key="E">E</button>
                <button class="key" data-key="R">R</button>
                <button class="key" data-key="T">T</button>
                <button class="key" data-key="Y">Y</button>
                <button class="key" data-key="U">U</button>
                <button class="key" data-key="I">I</button>
                <button class="key" data-key="O">O</button>
                <button class="key" data-key="P">P</button>
            </div>
            <!-- Fila 2 -->
            <div class="keyboard-row">
                <button class="key" data-key="A">A</button>
                <button class="key" data-key="S">S</button>
                <button class="key" data-key="D">D</button>
                <button class="key" data-key="F">F</button>
                <button class="key" data-key="G">G</button>
                <button class="key" data-key="H">H</button>
                <button class="key" data-key="J">J</button>
                <button class="key" data-key="K">K</button>
                <button class="key" data-key="L">L</button>
                <button class="key" data-key="Ñ">Ñ</button>
            </div>
            <!-- Fila 3 -->
            <div class="keyboard-row">
                <button class="key wide" id="enterKey" data-key="ENTER">ENTER</button>
                <button class="key" data-key="Z">Z</button>
                <button class="key" data-key="X">X</button>
                <button class="key" data-key="C">C</button>
                <button class="key" data-key="V">V</button>
                <button class="key" data-key="B">B</button>
                <button class="key" data-key="N">N</button>
                <button class="key" data-key="M">M</button>
                <button class="key wide" id="backspaceKey" data-key="BACKSPACE">⌫</button>
            </div>
        </div>

    </div>

    <!-- FOOTER RETRO -->
    <footer>
        <p>© 2026 Sports Hub Games - Módulo de Fútbol</p>
    </footer>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Lógica del juego -->
    <script src="jugador-dia.js"></script>

</body>
</html>
