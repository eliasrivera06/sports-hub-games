<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Sports Hub Games</title>
  <link rel="icon" href="../sports-hub-games/assets/images/logo_grande.png" type="image/png">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Animate -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<!-- Fuente retro -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<!-- CSS propio -->
<link rel="stylesheet" href="css/login.css">
<!-- CSS unificado de navbar/footer -->
<link rel="stylesheet" href="css/navbar-footer.css">
</head>

<body>

  <!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container">

    <a class="navbar-brand" href="index.html">
      <img src="assets/images/logo.png" class="logo">
    </a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="principal.html">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" href="perfil.html">Perfil</a></li>
        <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
      </ul>
    </div>

  </div>
</nav>

<div class="login-container">
  <div class="login-box animate__animated animate__zoomIn">

  <!-- Barra tipo ventana -->
  <div class="window-bar">
    <div class="dots">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
    </div>
<div style="font-size:12px; font-weight:bold;">X</div>
  </div>

  <div class="login-title">INICIAR SESION</div>

  <input type="email" id="email" class="input-retro" placeholder="Correo" required>
<div class="password-container">
  <input type="password" id="password" class="input-retro" placeholder="Contraseña" required>

  <button type="button" class="toggle-pass" onclick="togglePassword()" id="eyeBtn">
    👁
  </button>
</div>

  <button class="btn-retro btn-login" onclick="login()">
    ENTRAR
  </button>

  <div class="register">
    ¿Aún no tienes una cuenta? <br>
    <a href="registrarse.html">Regístrate</a>
  </div>

    </div>
</div>
<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Supabase Config -->
<script src="js/supabase-config.js"></script>
<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<!-- JS propio -->
<script src="js/login.js"></script>

</body>
</html>
